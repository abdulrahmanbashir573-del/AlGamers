<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Pro</title>

<style>

body{
margin:0;
font-family:Cairo;
background:#0f172a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:#020617;
display:flex;
flex-direction:column;
border-left:1px solid #111;
}

.new-chat{
padding:15px;
border-bottom:1px solid #111;
}

.new-chat button{
width:100%;
padding:10px;
background:#2563eb;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.chat-list{
flex:1;
overflow-y:auto;
padding:10px;
}

.chat-item{
padding:10px;
background:#1e293b;
margin-bottom:8px;
border-radius:8px;
cursor:pointer;
}

.chat-item:hover{
background:#334155;
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:10px;
background:#020617;
display:flex;
justify-content:space-between;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
margin:10px 0;
padding:12px;
border-radius:10px;
max-width:70%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.bot{
background:#1e293b;
}

/* INPUT */
.input-area{
display:flex;
padding:10px;
background:#020617;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:8px;
}

button{
margin-right:10px;
padding:10px;
background:#2563eb;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

/* LOGIN */
#login{
position:absolute;
width:100%;
height:100%;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
gap:10px;
}

footer{
text-align:center;
padding:5px;
font-size:12px;
background:#020617;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>تسجيل الدخول</h2>
<input id="username" placeholder="اكتب اسمك">
<button onclick="login()">دخول</button>
</div>

<!-- APP -->
<div class="sidebar">
<div class="new-chat">
<button onclick="newChat()">+ محادثة جديدة</button>
</div>

<div class="chat-list" id="chatList"></div>

<footer>
Abdulrahman Ahmed Bashir
</footer>
</div>

<div class="main">

<div class="header">
<span id="userName"></span>
<button onclick="logout()">خروج</button>
</div>

<div class="chat-box" id="chat"></div>

<div class="input-area">
<button onclick="sendMessage()">إرسال</button>
<input id="input" placeholder="اكتب سؤالك...">
</div>

</div>

<script>

let API_KEY = localStorage.getItem("apiKey") || "";
let currentChat = "chat1";

/* LOGIN */
function login(){
let name=document.getElementById("username").value;
if(!name) return alert("اكتب اسمك");

localStorage.setItem("user",name);
start();
}

function logout(){
localStorage.clear();
location.reload();
}

/* START */
function start(){

let user=localStorage.getItem("user");

if(!user){
document.getElementById("login").style.display="flex";
}else{
document.getElementById("login").style.display="none";
document.getElementById("userName").innerText="👤 "+user;
}

if(!API_KEY){
API_KEY=prompt("حط API KEY:");
localStorage.setItem("apiKey",API_KEY);
}

loadChats();
loadMessages();
}

/* CHATS */
function newChat(){
currentChat="chat"+Date.now();
saveChats();
document.getElementById("chat").innerHTML="";
}

function saveChats(){
let chats=JSON.parse(localStorage.getItem("chats")||"[]");
if(!chats.includes(currentChat)){
chats.push(currentChat);
localStorage.setItem("chats",JSON.stringify(chats));
}
}

function loadChats(){
let chats=JSON.parse(localStorage.getItem("chats")||"[]");
let list=document.getElementById("chatList");
list.innerHTML="";

chats.forEach(c=>{
let div=document.createElement("div");
div.className="chat-item";
div.innerText=c;
div.onclick=()=>{
currentChat=c;
loadMessages();
};
list.appendChild(div);
});
}

/* MESSAGES */
function saveMessage(text,type){
let key="messages_"+currentChat;
let msgs=JSON.parse(localStorage.getItem(key)||"[]");
msgs.push({text,type});
localStorage.setItem(key,JSON.stringify(msgs));
}

function loadMessages(){
let chat=document.getElementById("chat");
chat.innerHTML="";
let msgs=JSON.parse(localStorage.getItem("messages_"+currentChat)||"[]");

msgs.forEach(m=>{
addMessage(m.text,m.type,false);
});
}

function addMessage(text,type,save=true){

let chat=document.getElementById("chat");

let msg=document.createElement("div");
msg.className="message "+type;
msg.innerText=text;

chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;

if(save) saveMessage(text,type);
}

/* SEND */
async function sendMessage(){

let input=document.getElementById("input");
let text=input.value.trim();
if(!text) return;

addMessage(text,"user");
input.value="";

let reply=await getAI(text);

typeEffect(reply);

}

/* TYPING EFFECT */
function typeEffect(text){

let chat=document.getElementById("chat");

let msg=document.createElement("div");
msg.className="message bot";
chat.appendChild(msg);

let i=0;

function typing(){
if(i<text.length){
msg.innerHTML+=text[i];
i++;
setTimeout(typing,20);
}
chat.scrollTop=chat.scrollHeight;
}

typing();
saveMessage(text,"bot");
}

/* AI */
async function getAI(message){

try{

let res=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:message}]}]
})
}
);

let data=await res.json();

return data.candidates?.[0]?.content?.parts?.[0]?.text || "مفيش رد";

}catch{
return "حصل خطأ";
}

}

/* INIT */
start();

</script>

</body>
</html>
