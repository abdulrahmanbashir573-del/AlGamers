<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>

<style>

body{
margin:0;
font-family:Cairo;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

/* LOGIN */
#loginScreen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
gap:10px;
}

input{
padding:12px;
border:none;
border-radius:8px;
width:250px;
}

button{
padding:10px 15px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
}

/* CHAT */
#chatApp{
display:none;
flex-direction:column;
height:100vh;
}

header{
padding:10px;
background:#020617;
display:flex;
justify-content:space-between;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:15px;
}

.message{
margin:10px 0;
padding:10px;
border-radius:10px;
max-width:70%;
}

.user{
background:#2563eb;
margin-left:auto;
}

.bot{
background:#1e293b;
}

.input-area{
display:flex;
padding:10px;
background:#020617;
}

footer{
text-align:center;
padding:8px;
background:#020617;
font-size:13px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
<h2>تسجيل الدخول</h2>
<input id="username" placeholder="اكتب اسمك">
<button onclick="login()">دخول</button>
</div>

<!-- CHAT -->
<div id="chatApp">

<header>
<span id="userNameDisplay"></span>
<button onclick="logout()">خروج</button>
</header>

<div class="chat-box" id="chat"></div>

<div class="input-area">
<button onclick="sendMessage()">إرسال</button>
<input id="input" placeholder="اكتب سؤالك...">
</div>

<footer>
برمجة وإنشاء Abdulrahman Ahmed Bashir
</footer>

</div>

<script>

let API_KEY = localStorage.getItem("apiKey") || "";

/* LOGIN */
function login(){
let name=document.getElementById("username").value;

if(!name) return alert("اكتب اسمك");

localStorage.setItem("user",name);

startApp();
}

function logout(){
localStorage.clear();
location.reload();
}

/* START */
function startApp(){

let user=localStorage.getItem("user");

if(!user){
document.getElementById("loginScreen").style.display="flex";
document.getElementById("chatApp").style.display="none";
}else{
document.getElementById("loginScreen").style.display="none";
document.getElementById("chatApp").style.display="flex";
document.getElementById("userNameDisplay").innerText="👤 "+user;

loadMessages();
}

if(!API_KEY){
API_KEY=prompt("حط API KEY:");
localStorage.setItem("apiKey",API_KEY);
}

}

/* SAVE & LOAD */
function saveMessage(text,type){

let messages=JSON.parse(localStorage.getItem("messages")||"[]");

messages.push({text,type});

localStorage.setItem("messages",JSON.stringify(messages));
}

function loadMessages(){

let messages=JSON.parse(localStorage.getItem("messages")||"[]");

messages.forEach(m=>{
addMessage(m.text,m.type,false);
});

}

/* MESSAGE */
function addMessage(text,type,save=true){

let chat=document.getElementById("chat");

let msg=document.createElement("div");
msg.className="message "+type;
msg.innerText=text;

chat.appendChild(msg);
chat.scrollTop=chat.scrollHeight;

if(save) saveMessage(text,type);

}

/* SEND */
async function sendMessage(){

let input=document.getElementById("input");
let text=input.value.trim();

if(!text) return;

addMessage(text,"user");

input.value="";

let reply=await getAI(text);

addMessage(reply,"bot");

}

/* AI */
async function getAI(message){

try{

let res=await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`,
{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:message}]}]
})
}
);

let data=await res.json();

return data.candidates?.[0]?.content?.parts?.[0]?.text || "مفيش رد";

}catch{
return "حصل خطأ";
}

}

/* INIT */
startApp();

</script>

</body>
</html>
