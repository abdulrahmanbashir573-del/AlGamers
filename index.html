<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الذكاء الاصطناعي الخاص بي</title>

<style>

body{
margin:0;
font-family:Tahoma;
background:linear-gradient(135deg,#0a0f3c,#111c66);
color:white;
display:flex;
flex-direction:column;
height:100vh;
transition:0.3s;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
font-size:22px;
font-weight:bold;
}

.buttons{
display:flex;
gap:10px;
}

.topbtn{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
margin:10px 0;
padding:12px 16px;
border-radius:10px;
max-width:70%;
}

.user{
background:#2a7fff;
margin-left:auto;
}

.bot{
background:#222;
}

.input-area{
display:flex;
padding:10px;
background:#0b0f2e;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
outline:none;
}

button{
margin-right:10px;
padding:10px 16px;
border:none;
background:#2a7fff;
color:white;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d5ed6;
}

.quick{
padding:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.quick button{
background:#444;
}

footer{
text-align:center;
padding:10px;
font-size:14px;
background:#060a23;
}

.light{
background:#f2f2f2;
color:black;
}

.light .bot{
background:#ddd;
}

.light footer{
background:#ddd;
}

</style>

</head>

<body>

<header>

<div>الذكاء الاصطناعي الخاص بي</div>

<div class="buttons">

<button class="topbtn" onclick="toggleMode()">🌙</button>

<button class="topbtn" onclick="clearChat()">🗑</button>

</div>

</header>

<div class="chat-box" id="chat"></div>

<div class="quick">

<button onclick="quickMsg('اكتب مقال عن التكنولوجيا')">مقال</button>

<button onclick="quickMsg('اشرح الذكاء الاصطناعي')">شرح</button>

<button onclick="quickMsg('اعطني فكرة فيديو')">فكرة فيديو</button>

<button onclick="quickMsg('اكتب كود لعبة')">كود</button>

</div>

<div class="input-area">

<button onclick="sendMessage()">إرسال</button>

<input id="userInput" type="text" placeholder="اكتب سؤالك هنا...">

</div>

<footer>

هذا الموقع خاص ب Abdulrahman Bashir

</footer>

<script>

function sendMessage(){

let input=document.getElementById("userInput")
let chat=document.getElementById("chat")

if(input.value.trim()=="")return

addMessage(input.value,"user")

let text=input.value.toLowerCase()

let reply="أنا مازلت تحت التطوير 🤖"

if(text.includes("مرحبا")||text.includes("السلام"))
reply="أهلا بك 👋 كيف أساعدك؟"

else if(text.includes("اسمك"))
reply="أنا الذكاء الاصطناعي الخاص بهذا الموقع"

else if(text.includes("مين عملك"))
reply="تم إنشائي بواسطة Abdulrahman Bashir"

else if(text.includes("كود"))
reply="يمكنني مساعدتك في البرمجة 💻"

else if(text.includes("فيديو"))
reply="فكرة فيديو: جرب عمل فيديو عن التكنولوجيا الحديثة"

else if(text.includes("ذكاء"))
reply="الذكاء الاصطناعي هو قدرة الكمبيوتر على التفكير مثل البشر"

setTimeout(()=>{

addTyping(reply)

},600)

input.value=""

}

function addMessage(text,type){

let chat=document.getElementById("chat")

let msg=document.createElement("div")

msg.className="message "+type

msg.innerText=text

chat.appendChild(msg)

chat.scrollTop=chat.scrollHeight

}

function addTyping(text){

let chat=document.getElementById("chat")

let msg=document.createElement("div")

msg.className="message bot"

chat.appendChild(msg)

let i=0

let speed=30

function type(){

if(i<text.length){

msg.innerHTML+=text.charAt(i)

i++

setTimeout(type,speed)

}

chat.scrollTop=chat.scrollHeight

}

type()

}

function toggleMode(){

document.body.classList.toggle("light")

}

function clearChat(){

document.getElementById("chat").innerHTML=""

}

function quickMsg(text){

document.getElementById("userInput").value=text

sendMessage()

}

</script>

</body>

</html>
